name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: '1'
  # Required by @repo/env when backend (or tests) load the module
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
  JWT_SECRET: ci-jwt-secret-min-8-chars
  NODE_ENV: test

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Backend: eslint em apps/backend/src ainda tem dívida (prettier + @typescript-eslint); corrigir em follow-up.
      - name: Lint
        run: npx turbo run lint --filter='!backend'

      - name: Typecheck
        run: npx turbo run check-types

      - name: Test
        run: npx turbo run test

      - name: Build
        run: npx turbo run build
